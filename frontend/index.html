<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/Mini.png" />
    <link rel="apple-touch-icon" href="/Mini.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Viewport and Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#d97706" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Primary Meta Tags -->
    <title>Ashraf Furnitures - Premium Craftsmanship & Style | Quality Furniture</title>
    <meta
      name="title"
      content="Ashraf Furnitures - Premium Craftsmanship & Style | Quality Furniture"
    />
    <meta
      name="description"
      content="Discover premium furniture at Ashraf Furnitures. 42+ years of excellence in quality craftsmanship. Shop sofas, dining tables, bedroom sets, office furniture & more. 50,000+ satisfied customers."
    />
    <meta
      name="keywords"
      content="furniture, home furniture, premium furniture, office furniture, bedroom furniture, living room furniture, dining furniture, sofas, tables, chairs, quality furniture, ashraf furnitures, furniture store, modern furniture"
    />
    <meta name="author" content="Ashraf Furnitures" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- Geo Tags (Update with actual location) -->
    <meta name="geo.region" content="PK" />
    <meta name="geo.placename" content="Pakistan" />
    
    <!-- Language -->
    <meta http-equiv="content-language" content="en-US" />
    
    <!-- Open Graph Meta Tags (Facebook, LinkedIn) -->
    <meta property="og:title" content="Ashraf Furnitures - Premium Furniture Collection" />
    <meta property="og:description" content="Transform your space with quality furniture from Ashraf Furnitures. 42+ years of excellence, 50,000+ happy customers." />
    <meta property="og:image" content="/Mini.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:site_name" content="Ashraf Furnitures" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ashraf Furnitures - Premium Furniture Collection" />
    <meta name="twitter:description" content="Transform your space with quality furniture. 42+ years of craftsmanship." />
    <meta name="twitter:image" content="/Mini.png" />
    <meta name="twitter:site" content="@ashraffarnitures" />
    <meta name="twitter:creator" content="@ashraffarnitures" />

    <!-- DNS Prefetch & Preconnect for faster resource loading -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://www.google.com" />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://www.google.com" />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/Asset 5.png" as="image" />
    <link rel="preload" href="/Mini.png" as="image" />

    <!-- Google Fonts - Clean Professional Typography with font-display swap for better performance -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=optional"

    />
